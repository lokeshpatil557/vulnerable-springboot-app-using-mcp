# =====================================================================
# OWASP VULNERABILITY LEARNING LAB
# WARNING: ALL VALUES BELOW ARE INTENTIONALLY INSECURE.
# DO NOT DEPLOY. EDUCATIONAL USE ONLY.
# =====================================================================

# Application
spring.application.name=vulnerable-spring-app
server.port=8080

# ---------------------------------------------------------------------
# REMEDIATION (OWASP A05:2021 - Security Misconfiguration /
#              OWASP A02:2021 - Cryptographic Failures):
# Secrets MUST be supplied at deploy time via environment variables.
# See SecretConfig.java.  No defaults are committed to source control.
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:owaspdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# REMEDIATION (VULN-004 / VULN-017): H2 console is OFF by default.
# Enable only in a local sandbox profile by setting
# APP_H2_CONSOLE_ENABLED=true. When disabled, the SecurityConfig
# does NOT register the h2-console permitAll chain and the
# endpoint is denied.
app.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# REMEDIATION (VULN-010 / VULN-013): secrets sourced from env vars.
# Example: APP_SECRET_API_KEY, APP_SECRET_DB_PASSWORD, APP_SECRET_JWT_SIGNING_KEY
app.secret.api.key=${APP_SECRET_API_KEY:}
app.secret.db.password=${APP_SECRET_DB_PASSWORD:}
app.secret.jwt.signing.key=${APP_SECRET_JWT_SIGNING_KEY:}

# JPA / Hibernate
# REMEDIATION (A05:2021 - Security Misconfiguration):
# ddl-auto=create is destructive on every restart. The sandbox
# (default) profile activates an override in
# application-sandbox.properties that sets ddl-auto=create. Other
# profiles (prod, test, ...) inherit the conservative default of
# `validate` so a misconfigured deployment cannot silently wipe
# the database.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# REMEDIATION (VULN-014): disable verbose SQL logging that leaks
# parameter bindings (and therefore credentials / PII).
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=NONE

# REMEDIATION (A04:2021): reject unknown JSON fields on request DTOs
# so mass-assignment attempts (e.g. {"role":"ADMIN"}) are rejected
# before they reach the controller.
spring.jackson.deserialization.fail-on-unknown-properties=true

# REMEDIATION (A05:2021): don't leak stack traces or internal messages
# via Spring's default error attributes.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# REMEDIATION (A09:2021 - Security Logging & Monitoring Failures):
# Spring Security's own INFO logs can include principal names and
# request paths; pin to WARN so the default root=INFO does not
# surface them in the application log stream.
logging.level.org.springframework.security=WARN

# REMEDIATION (A05:2021 - Security Misconfiguration):
# HTTP Basic authentication is enabled in SecurityConfig. The
# Authorization: Basic header MUST be carried over a TLS-terminated
# channel. In production deployments, terminate TLS at a reverse
# proxy (nginx / Spring Cloud Gateway / managed LB) and enforce
# HSTS. The HSTS header below is harmless over HTTP but only takes
# effect on the first response delivered over HTTPS.
#
# server.ssl.* properties are intentionally NOT set here so a
# non-TLS misconfiguration fails loud (Spring Boot will not start
# an HTTPS listener without a keystore) rather than silently serving
# HTTP. A real deployment must provide keystore material via the
# SPRING_SSL_*-prefixed environment variables or a server.ssl.* block
# in an environment-specific profile (e.g. application-prod.properties).
