# =====================================================================
# Sandbox profile
#
# REMEDIATION (OWASP A05:2021 - Security Misconfiguration):
# Activate with `--spring.profiles.active=sandbox`. Anything not
# in this file inherits the conservative defaults from
# application.properties.
# =====================================================================

# In the sandbox we accept the destructive schema reset because the
# H2 database is in-memory and the lab data is re-seeded on every
# startup (see DataSeeder). In any other profile the default is
# `validate` so a misconfigured deployment cannot wipe the DB.
spring.jpa.hibernate.ddl-auto=create

# REMEDIATION (A05:2021 / A07:2021): opt in to the default-credential
# seed users (admin/admin123, alice/alice123, bob/bob123). The
# seeder refuses to run outside the sandbox profile.
app.seed.enabled=true
